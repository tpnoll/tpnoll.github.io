<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curriculum Vitae</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Curriculum Vitae</h1>
            <p class="subtitle">Experiences & Projects</p>
        </header>

        <div class="filters">
            <div class="filter-group">
                <h3>Filter by Class</h3>
                <div id="classFilters" class="filter-buttons"></div>
            </div>
            <div class="filter-group">
                <h3>Filter by Type</h3>
                <div id="typeFilters" class="filter-buttons"></div>
            </div>
            <div class="filter-actions">
                <button id="clearFilters" class="clear-btn">Clear Filters</button>
                <button id="toggleExpandAll" class="clear-btn">Collapse All</button>
            </div>
        </div>

        <div id="experiences" class="experiences-container"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
